input {
  file {
    path => "/usr/share/logstash/logs/ecommerce.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
  }
}

filter {
  json {
    source => "message"
  }

  # Parse timestamp
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Calculate revenue
  if [price] and [quantity] {
    ruby {
      code => "event.set('revenue', event.get('price') * event.get('quantity'))"
    }
  }

  # Categorize by price range
  if [price] {
    if [price] < 50 {
      mutate { add_field => { "price_category" => "Budget" } }
    } else if [price] < 200 {
      mutate { add_field => { "price_category" => "Mid-Range" } }
    } else {
      mutate { add_field => { "price_category" => "Premium" } }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ecommerce-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}